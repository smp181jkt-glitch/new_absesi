<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    #reader { width: 100%; max-width: 400px; margin: auto; }
    #statusPesan { margin: 20px 0; font-size: 1.2em; font-weight: bold; }
  </style>
</head>
<body>
  <h3>Scanner Absensi</h3>
  <div id="reader"></div>
  <div id="statusPesan"></div>
  <button id="btnScanLagi" style="display:none; padding:15px;" onclick="mulaiScan()">Scan Siswa Selanjutnya</button>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx5PqHz-2WxdiXIOFS8xFqh_OGU_rkDu2DzRgmRiX_zqoqnpbqYI5EVuL7S1fqNuEM4/exec";
    let html5Qrcode = new Html5Qrcode("reader");

    function mulaiScan() {
      document.getElementById('statusPesan').innerText = "Mengarahkan kamera...";
      document.getElementById('btnScanLagi').style.display = "none";
      
      html5Qrcode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
        html5Qrcode.stop();
        document.getElementById('statusPesan').innerText = "Memproses...";
        
        fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({ id: decodedText, status: "Hadir" })
        })
        .then(res => res.json())
        .then(data => {
          if(data.status === "success") {
            document.getElementById('statusPesan').innerHTML = "✅ Berhasil: <b>" + data.namaSiswa + "</b>";
          } else {
            document.getElementById('statusPesan').innerText = "⚠️ " + data.message;
          }
          document.getElementById('btnScanLagi').style.display = "block";
        });
      });
    }
    mulaiScan();
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner Absensi</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    #reader { width: 100%; max-width: 400px; margin: auto; }
    #statusPesan { margin: 20px 0; font-size: 1.2em; padding: 15px; border-radius: 8px; min-height: 50px; }
    button { padding: 15px 30px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; width: 100%; max-width: 300px; }
  </style>
</head>
<body>
  <h3>Scanner Absensi</h3>
  <div id="reader"></div>
  <div id="statusPesan"></div>
  <button id="btnScanLagi" style="display:none;" onclick="mulaiScan()">Scan Siswa Selanjutnya</button>

  <script>
    // PASTIKAN URL INI ADALAH URL WEB APP ANDA YANG TERBARU
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyE-zTHvc3vjvHAfNfXfcI0tx3KdNd6VWULCCN7LH6ycix7M9U5QVScxQG7edCvdujy/exec";
    
    let html5Qrcode = new Html5Qrcode("reader");

    function mulaiScan() {
      document.getElementById('statusPesan').innerText = "Mengarahkan kamera...";
      document.getElementById('btnScanLagi').style.display = "none";
      
      html5Qrcode.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: 250 },
        (decodedText) => {
          html5Qrcode.stop();
          document.getElementById('statusPesan').innerText = "Memproses...";
          
          fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors", // Jika tetap error, hapus baris ini
            body: JSON.stringify({ id: decodedText, status: "Hadir" })
          })
          .then(() => {
            // Karena kita menggunakan no-cors, kita tidak bisa membaca return JSON dari GAS
            // Kita gunakan logika sederhana untuk menampilkan pesan sukses
            document.getElementById('statusPesan').innerHTML = "✅ Absensi berhasil direkam!";
            document.getElementById('btnScanLagi').style.display = "inline-block";
          })
          .catch(err => {
            document.getElementById('statusPesan').innerText = "⚠️ Terjadi kesalahan.";
            document.getElementById('btnScanLagi').style.display = "inline-block";
          });
        }
      );
    }

    // Jalankan scan saat halaman dibuka
    mulaiScan();
  </script>
</body>
</html>
